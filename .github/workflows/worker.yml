name: Video Worker

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      skip_image:
        description: "Generate text-only (skip reference image) for testing"
        type: boolean
        default: false

concurrency:
  group: video-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # much faster now — no browser, no Chromium download
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Chromium for token generation
        run: npx playwright install --with-deps chromium

      - name: Run worker (queue + RSS)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          CAPTCHA_SERVICE: ${{ secrets.CAPTCHA_SERVICE }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          WORKER_MAX_VIDEOS: "4"
          SKIP_IMAGE: ${{ github.event.inputs.skip_image == 'true' && '1' || '' }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" node worker.js