services:
  - type: web
    name: flow-studio
    runtime: docker
    plan: free               # dashboard only — jobs run in GitHub Actions
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: RUN_JOBS
        value: "false"        # queue jobs instead of running Playwright/ffmpeg here
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false